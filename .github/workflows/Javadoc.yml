name: "Generar y Publicar Javadoc"

on:
  push:
    branches:
      - stable  # Solo se ejecuta cuando hay cambios en la rama estable

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 18
        uses: actions/setup-java@v4
        with:
          java-version: '18'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generar Javadoc con Maven
        run: mvn javadoc:javadoc

      - name: Desplegar en GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: target/site/apidocs # Carpeta donde Maven guarda el Javadoc
          branch: gh-pages # Rama de destino para la web
